<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #fff; padding: 1rem; }
.panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; background: #e5e7eb; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
.col { background: #fff; padding: 14px 14px 16px; }
.col-title { font-size: 12px; font-weight: 600; color: #111; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; font-family: sans-serif; }
.btn-row { display: flex; flex-direction: column; gap: 2px; }
.btn { display: block; width: 100%; text-align: left; font-size: 12px; font-family: monospace; color: #6b7280; padding: 5px 8px; border-radius: 5px; border: none; background: transparent; cursor: pointer; transition: background 0.1s, color 0.1s; }
.btn:hover { background: #f3f4f6; color: #111; }
.btn:active { transform: scale(0.97); }
.tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; float: right; margin-top: 2px; font-family: sans-serif; }
.it  { background: #e6f4ec; color: #1a6636; }
.en  { background: #e6eef8; color: #1a3a6b; }
.fwd { background: #f3f4f6; color: #6b7280; }
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; border-radius: 6px; padding: 8px 16px; font-size: 12px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; font-family: monospace; }
</style>
</head>

function copy(text, label) {
  // fallback for file:// protocol
  function fallback(t) {
    const ta = document.createElement("textarea");
    ta.value = t;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand("copy"); } catch(e) {}
    document.body.removeChild(ta);
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(() => fallback(text));
  } else {
    fallback(text);
  }
  const t = document.getElementById('toast');
  t.textContent = '\u2713 copiato: ' + label;
  t.style.opacity = '1';
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.style.opacity = '0', 1800);
}
